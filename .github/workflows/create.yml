name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute BASE_URL
        id: base
        run: |
          # Use custom override if provided, otherwise derive from repo:
          # - user/org sites (<user>.github.io) -> "/"
          # - project sites                     -> "/<repo>/"
          if [ -n "${{ vars.BASE_URL }}" ]; then
            BASE="${{ vars.BASE_URL }}"
          else
            REPO="${{ github.event.repository.name }}"
            OWNER="${{ github.repository_owner }}"
            if [ "$REPO" = "${OWNER}.github.io" ]; then
              BASE="/"
            else
              BASE="/${REPO}/"
            fi
          fi
          echo "Using BASE_URL=$BASE"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bun run build
        env:
          BASE_URL: ${{ steps.base.outputs.base }}
          VITE_BASE_URL: ${{ steps.base.outputs.base }}

      - name: Add SPA fallback (404.html)
        run: |
          if [ -d "dist" ] && [ -f "dist/index.html" ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5